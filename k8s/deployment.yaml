apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentverse-backend
  labels:
    app: agentverse-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agentverse-backend
  template:
    metadata:
      labels:
        app: agentverse-backend
    spec:
      containers:
      - name: backend
        image: agentverse/backend:v2.5.0
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentverse-frontend
  labels:
    app: agentverse-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentverse-frontend
  template:
    metadata:
      labels:
        app: agentverse-frontend
    spec:
      containers:
      - name: frontend
        image: agentverse/frontend:v2.5.0
        ports:
        - containerPort: 3000

